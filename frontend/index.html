<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FaceEmotionTrackAI - Real-time biometric emotion analysis" />
    <title>FaceEmotionTrackAI</title>

    <!-- Cyberpunk fonts: Orbitron for display, Share Tech Mono for data readouts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="/src/assets/main_icon.svg" />

    <style>
      /* Cyberpunk scanline effect on root - visible before React mounts */
      :root {
        --purple-950: #0d0010;
        --purple-900: #1a0030;
        --purple-800: #2d0057;
        --purple-700: #4a0080;
        --purple-600: #6600b3;
        --purple-500: #8800e6;
        --purple-400: #aa00ff;
        --purple-300: #cc44ff;
        --purple-200: #dd88ff;
        --purple-100: #f0ccff;
        --violet-500: #7c3aed;
        --violet-400: #a855f7;
        --neon-purple: #bf00ff;
        --neon-violet: #9d00ff;
        --glow-sm: 0 0 8px rgba(170, 0, 255, 0.6);
        --glow-md: 0 0 20px rgba(170, 0, 255, 0.5), 0 0 40px rgba(170, 0, 255, 0.2);
        --glow-lg: 0 0 30px rgba(170, 0, 255, 0.7), 0 0 60px rgba(170, 0, 255, 0.3), 0 0 100px rgba(170, 0, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background-color: var(--purple-950);
        color: var(--purple-100);
        font-family: 'Rajdhani', sans-serif;
        overflow-x: hidden;
      }

      /* Boot screen shown while React loads */
      #root {
        min-height: 100vh;
        position: relative;
      }

      /* Scanline overlay - pure CSS cyberpunk effect */
      #root::before {
        content: '';
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* Boot loader */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--purple-950);
        z-index: 100;
        gap: 24px;
        transition: opacity 0.5s ease;
      }

      #boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-title {
        font-family: 'Orbitron', monospace;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--neon-purple);
        text-shadow: var(--glow-md);
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }

      .boot-bar-container {
        width: 280px;
        height: 2px;
        background: rgba(170, 0, 255, 0.2);
        border: 1px solid rgba(170, 0, 255, 0.3);
        position: relative;
        overflow: hidden;
      }

      .boot-bar {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--purple-600), var(--neon-purple), var(--purple-300));
        box-shadow: var(--glow-sm);
        animation: bootProgress 1.2s ease-out forwards;
      }

      .boot-status {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.7rem;
        color: var(--purple-400);
        letter-spacing: 0.15em;
        animation: bootText 1.2s steps(1) forwards;
      }

      @keyframes bootProgress {
        0%   { width: 0%; }
        30%  { width: 35%; }
        60%  { width: 72%; }
        85%  { width: 91%; }
        100% { width: 100%; }
      }

      @keyframes bootText {
        0%   { content: 'INITIALIZING NEURAL CORE...'; }
        30%  { content: 'LOADING BIOMETRIC MODULES...'; }
        60%  { content: 'CALIBRATING EMOTION ENGINE...'; }
        100% { content: 'SYSTEM READY'; }
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--purple-950);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--purple-700);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--neon-purple);
        box-shadow: var(--glow-sm);
      } 

      .boot-status::after {
        content: 'INITIALIZING NEURAL CORE...';
        animation: bootText 1.2s steps(1) forwards;
      }

      @keyframes bootText {
        0%   { content: 'INITIALIZING NEURAL CORE...'; }
        30%  { content: 'LOADING BIOMETRIC MODULES...'; }
        60%  { content: 'CALIBRATING EMOTION ENGINE...'; }
        100% { content: 'SYSTEM READY'; }
      }

    </style>
  </head>

  <body>
    <!-- Boot loader - hidden once React mounts -->
    <div id="boot-loader">
      <div class="boot-title">FACETRACK_AI</div>
      <div class="boot-bar-container">
        <div class="boot-bar"></div>
      </div>
      <div class="boot-status">INITIALIZING NEURAL CORE...</div>
    </div>

    <div id="root"></div>

    <script>
      // Hide boot loader once React has mounted
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('boot-loader');
          if (loader) loader.classList.add('hidden');
        }, 1400);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
