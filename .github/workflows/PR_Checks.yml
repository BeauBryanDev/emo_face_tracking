name: PR Quality Gate

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff linter
        working-directory: backend
        run: |
          ruff check app/ --select E,F,W --ignore E501

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p backend/logs
          mkdir -p backend/ml_weights/detection
          mkdir -p backend/ml_weights/recognition
          mkdir -p backend/ml_weights/liveness
          mkdir -p backend/ml_weights/emotion

      - name: Run unit tests
        working-directory: backend
        env:
          ENVIRONMENT: development
          LOG_LEVEL: WARNING
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: sqlite:///:memory:
          MODELS_PATH: /app/ml_weights
          PYTHONPATH: .
        run: |
          pytest tests/test_face_math.py \
                 tests/test_face_geometry.py \
                 tests/test_inference_engine.py \
                 -v --tb=short \
                 --junit-xml=test-results-unit.xml

      - name: Run integration tests
        working-directory: backend
        env:
          ENVIRONMENT: development
          LOG_LEVEL: WARNING
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: sqlite:///:memory:
          MODELS_PATH: /app/ml_weights
          PYTHONPATH: .
        run: |
          pytest tests/test_integration_auth.py \
                 tests/test_integration_users.py \
                 tests/test_integration_emotions.py \
                 -v --tb=short \
                 --junit-xml=test-results-integration.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            backend/test-results-unit.xml
            backend/test-results-integration.xml
          comment_title: "Test Results"
          check_name: "Test Results"
